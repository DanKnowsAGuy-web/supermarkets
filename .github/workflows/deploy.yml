name: Deploy to GitHub Pages

on:
  # Build and deploy on every push to the default branch.
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Permissions the GITHUB_TOKEN needs to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Astro site
        # Auto-detects the package manager, runs the build, reads site/base
        # from astro.config.mjs, and uploads the Pages artifact.
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
